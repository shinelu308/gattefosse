  <script>
    $(document).ready(function () {
      $("#header").load("/header.html", function () {
        let tmp = checkLoginStatus();
        if (!tmp) {
          alert("请先登录");
          window.location.href = "/account.html";

        } else {
          $("#collapseAccMenu").load("/account-menu-after-login.html");
        }
      });
      $("#footer").load("/footer.html");
      $("#quickLinks").load("/quickLinks.html");
      $("#worldList").load("/world.html");
    });
    function getCartNum() {
      if (checkLoginStatus()) {
        GatteAPI.Cart.count().then(res => {
          $("#cartNum").html(res.data.count || 0);
        }).catch(err => {
          $("#cartNum").html(0);
        });
      } else {
        $("#cartNum").html(0);
      }
    }

    // 获取对话框元素和关闭按钮
    var dialog = document.getElementById('dialog');
    var dialogClose = document.getElementById('dialog-close');
    var dialogMessage = document.getElementById('dialog-message');

    // 替代alert函数
    function showDialog(message) {
      dialogMessage.innerHTML = message;
      dialog.style.display = 'block';
    }

    // 关闭对话框
    dialogClose.addEventListener('click', function () {
      dialog.style.display = 'none';
    });

  </script>
  <script setup>
    const params = new URLSearchParams(window.location.search);
    const tokenStr = params.get('_token');
    const goodsCategoryId = params.get('i'); // "关联产品分类ID"
    var w = params.get('keyword'); //搜索关键词
    var atype = params.get('type'); //0所有，1新闻，2活动
    var curPage = params.get('page');
    var curUrl = window.location.href;
    var hasParam = curUrl.indexOf('?');
    var hasTypeParam = curUrl.indexOf('i=');
    var total = 0, count_0 = 0, count_1 = 0, count_2 = 0;
    const { createApp, reactive, getCurrentInstance, ref, router, nextTick } = Vue;
    const app = createApp({
      data() {
        return { formData: [] }
      },
      setup() {
        let randomNum = Math.floor(Math.random() * 100);
        const data = reactive({
          name: "aa",
          formData: [],
          total: 0,
          count_0: 0,
          count_1: 0,
          count_2: 0,
          cur_page: curPage == null ? 1 : curPage,
          page_size: 100000,
          total_page: 1,
          prev_url: '',
          next_url: '',
          keyword: w,
          type: atype,
          goodsCategoryId: goodsCategoryId,
          hasParam: hasParam,
          hasTypeParam: hasTypeParam,
          randomNum: randomNum,
          personalCare: { list: [], count: 0 },
          pharmaceuticals: { list: [], count: 0 },
          show: ""
        });
        const formData = ref({
          address: '',
          cityId: 0,
          cityName: '',
          comment: '请描述拟申请样品的具体应用.....',
          companyName: '',
          department: '',
          sampleList: '',
          dft: false,
          districtId: 0,
          districtName: '',
          email: '',
          jobTitle: '',
          market: '',
          mobile: '',
          name: '',
          phone: '',
          position: '',
          provinceId: 0,
          provinceName: '',
          updateTime: new Date(),
          userId: 0,
          zipcode: 0,
        })
        getInformation();
        //方法1
        function getInformation() {
          //方法的实现
          data.name = "引入的html文件";
        }
        const setComment = () => {
          if (formData.value.comment == '请描述拟申请样品的具体应用.....') {
            formData.value.comment = '';
          }
        }
        //  方法2
        const handleClick = (val) => {
          var api = 'api/mallSampleOrder/createMallSampleOrder';
          if (data.personalCare.list.length <= 0 && data.pharmaceuticals.list.length <= 0) {
            alert("请先选择样品");
            return null;
          }
          var simpleList = "";
          for (var i = 0; i < data.personalCare.list.length; i++) {
            simpleList += data.personalCare.list[i].goodsName + ",";
          }
          for (var i = 0; i < data.pharmaceuticals.list.length; i++) {
            simpleList += data.pharmaceuticals.list[i].goodsName + ",";
          }
          if (simpleList.charAt(simpleList.length - 1) == ',') {
            simpleList = simpleList.substring(0, simpleList.length - 1);
          }
          // 新增：判断邮箱后缀
          const email = formData.value.email || '';
          const forbiddenDomains = ['163.com', '126.com', 'qq.com', '139.com', '189.cn'];
          if (forbiddenDomains.some(domain => email.endsWith('@' + domain))) {
            alert("请使用公司邮箱");
            return;
          }
          formData.value.sampleList = simpleList
          setComment() // 置空
          if(formData.value.comment == '') {
            alert("请描述拟申请样品的具体应用");
            return;
          }
          // 使用新的 Order API 提交订单
          const orderData = {
            companyName: formData.value.companyName,
            contactName: formData.value.name,
            phone: formData.value.phone || formData.value.mobile,
            address: formData.value.address,
            notes: formData.value.comment
          };
          
          GatteAPI.Order.create(orderData).then((res) => {
            if (res.code == 0 || res.data && res.data.code == 0) {
              clearCart()
              alert("您的预定信息已经提交，我们的工作人员会与您联系确认！");
            } else {
              alert("预定失败！");
            }
          }).catch(err => {
            console.error('提交订单失败:', err);
            alert("预定失败，请重试！");
          });
        };
        const removeFromCart = (item) => {
          let tmp = checkLoginStatus();
          if (!tmp) {
            alert("请先登录");
            return
          }
          // 使用新的 Cart API 删除商品
          GatteAPI.Cart.remove(item.ID).then((res) => {
            console.log(res);
            if (res.code == 0 || res.data && res.data.code == 0) {
              item.show = "display:none";
              if (item.goodsCategoryId == 117) {
                const index = data.pharmaceuticals.list.findIndex(i => i.ID === item.ID);
                if (index > -1) {
                  data.pharmaceuticals.list.splice(index, 1);
                  data.pharmaceuticals.count -= 1;
                }
              } else {
                const index = data.personalCare.list.findIndex(i => i.ID === item.ID);
                if (index > -1) {
                  data.personalCare.list.splice(index, 1);
                  data.personalCare.count -= 1;
                }
              }
              data.total = data.personalCare.count + data.pharmaceuticals.count;
              if (data.total == 0) {
                data.show = "display:none";
              }
              getCartNum();
            }
          }).catch(err => {
            console.error('删除失败:', err);
            alert('删除失败，请重试');
          });
        }
        const clearCart = () => {
          let tmp = checkLoginStatus();
          if (!tmp) {
            alert("请先登录");
            return
          }
          // 使用新的 Cart API 逐个删除商品
          const allItems = [...data.personalCare.list, ...data.pharmaceuticals.list];
          if (allItems.length === 0) {
            data.show = "display:none";
            data.pharmaceuticals.count = 0;
            data.personalCare.count = 0;
            data.total = 0;
            document.getElementById("cartNum").innerHTML = 0;
            return;
          }
          
          let deletedCount = 0;
          allItems.forEach((item) => {
            GatteAPI.Cart.remove(item.ID).then((res) => {
              deletedCount++;
              if (deletedCount === allItems.length) {
                // 所有商品都已删除
                data.show = "display:none";
                data.pharmaceuticals.list = [];
                data.pharmaceuticals.count = 0;
                data.personalCare.list = [];
                data.personalCare.count = 0;
                data.total = 0;
                document.getElementById("cartNum").innerHTML = 0;
              }
            }).catch(err => {
              console.error('删除商品失败:', err);
            });
          });
        }
        // 查询
        const getTableData = () => {
          // 使用新的 Cart API
          GatteAPI.Cart.list().then((res) => {
            // 请求成功的回调函数
            const cartItems = res.data || [];
            data.formData = cartItems.map(item => {
              // 映射 API 响应到模板字段
              return {
                ID: item.id,
                goodsName: item.product.name,
                subtitle: item.product.inciName || '',
                code: item.productId || '',
                goodsIntro: item.product.description || '',
                goodsCoverImg: item.product.imageUrl || '',
                goodsCategoryId: item.productType === 'pharmaceuticals' ? 117 : 1,
                quantity: item.quantity,
                show: ''
              };
            });
            
            // 清空现有列表
            data.personalCare.list = [];
            data.personalCare.count = 0;
            data.pharmaceuticals.list = [];
            data.pharmaceuticals.count = 0;
            
            // 重新分类产品
            for (var i = 0; i < data.formData.length; i++) {
              if (data.formData[i].goodsCategoryId == 117) {
                data.pharmaceuticals.list.push(data.formData[i]);
                data.pharmaceuticals.count += 1;
              } else {
                data.personalCare.list.push(data.formData[i]);
                data.personalCare.count += 1;
              }
            }
            
            data.total = data.personalCare.count + data.pharmaceuticals.count;
            if (data.total == 0) {
              data.show = "display:none";
            }
          }).catch((err, res) => {
            console.log(err)
          })
        }
        const loading = ref(false);
        const items = ref([]);
        getTableData()
        return {
          data,
          handleClick,
          items,
          getTableData,
          removeFromCart,
          clearCart,
          formData,
          setComment
        };
      },
    });
    let result = app.mount("#app");
  </script>

    function setUrlParam(url, paramName, paramValue) {
        paramName = paramName.replace(/[\[\]]/g, '\\$&');
        let regular = new RegExp('[?&]' + paramName + '(=([^&#]*)|&|#|$)');
        let val = regular.exec(url);
        if (val && val[2]) {
            url = url.replace(new RegExp(paramName + '=' + val[2]), `${paramName}=${paramValue}`);
        } else {
            if (url.indexOf('?') < 0) {
                url += `?${paramName}=${paramValue}`;
            } else {
                url += `&${paramName}=${paramValue}`;
            }
        }
        return url;
    }

        var countdown = document.getElementById('countdown');
        if (countdown != null && countdown != undefined) {
            countdown.style.display = displ;
        }
    }

    // 倒计时

    const countdownDuration = 5 * 1000; // 10分钟
    let countdown = countdownDuration;

    // 更新倒计时的函数
    function updateCountdown() {
        const minutes = Math.floor(countdown / 60 / 1000);
        const seconds = Math.floor((countdown % 60000) / 1000);

        // 输出到页面上的元素
        document.getElementById('countdown').textContent = minutes + ":" + (seconds < 10 ? '0' : '') + seconds;

        // 如果倒计时结束，清除interval并显示消息
        if (countdown <= 0) {
            // clearInterval(intervalId);

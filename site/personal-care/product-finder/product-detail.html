                  </div>

                <div class="s-product-specs__item">

                      <circle cx="12" cy="12" r="9.5"/>
                      <path d="M8 12.5l3 3 5-6"/>
                    </svg>
                  </div>
                  <div class="s-product-specs__text" v-html="formatSpecText(data.productSpecs.dosage || data.productDetail.dosage)"></div>
                </div>
                <div class="s-product-specs__item">
                  <div class="s-product-specs__icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#8EB73C" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:3.2rem;height:3.2rem;">
                      <circle cx="12" cy="12" r="9.5"/>
                      <path d="M12 5C9 8 7 11 7 14c0 3.3 2.2 6 5 6s5-2.7 5-6c0-3-2-6-5-10z"/>
                      <path d="M12 5v14"/>
                    </svg>
                  </div>
                  <div class="s-product-specs__text" v-html="formatSpecText(data.productSpecs.certification)"></div>
                </div>
                <div class="s-product-specs__item">
                  <div class="s-product-specs__icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#8EB73C" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:3.2rem;height:3.2rem;">
                      <circle cx="12" cy="12" r="9.5"/>
                      <text x="12" y="15" text-anchor="middle" font-size="5.5" font-weight="800" fill="#8EB73C" stroke="none" font-family="Arial, Helvetica, sans-serif" letter-spacing="0.5">INCI</text>
                    </svg>
                  </div>
                  <div class="s-product-specs__text" v-html="formatSpecText(data.productSpecs.inci)"></div>
                </div>
              </div>
            </div>
            <!-- 产品视频区 — 固定在规格区下方、内容区块上方（左文字 + 右视频） -->
            <div v-if="data.productDetail.videoUrl" class="s-product-video" style="padding:40px 0;">
              <div class="container" style="max-width:1170px;margin:0 auto;">
                <div style="display:flex;gap:40px;align-items:flex-start;">
                  <div style="flex:1;min-width:0;">
                    <p style="font-size:4.8rem;font-family:'Din Next Slab Pro Bold',sans-serif;font-weight:400;letter-spacing:0;position:relative;padding-right:2.8rem;color:#3E3E3E;line-height:1.3;margin:0;">

                      <iframe :src="convertVideoUrl(data.productDetail.videoUrl)" style="position:absolute;top:0;left:0;width:100%;height:100%;" frameborder="0" allowfullscreen></iframe>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div class="s-product-content">
              <div class="container">
                <div class="s-product-content__inside" style="max-width: 1170px; margin: 0 auto;">
                  <!-- 模块化内容区块渲染（跳过顶部已显示的描述和宣称） -->
                  <template v-for="(block, bi) in data.contentBlocks" :key="block.id || bi">
                    <div v-if="block.title !== '描述' && block.title !== '产品宣称'" class="s-product-content__item" style="margin-bottom: 40px;">
                    <!-- 区块标题 -->
                    <h2 v-if="block.title" class="s-product-content__title">{{ block.title }}</h2>
                    <!-- 富文本区块 -->
                    <div v-if="block.blockType === 'richtext' && block.content" v-html="block.content.html" class="block-content"></div>
                    <!-- 视频区块 -->
                    <div v-if="block.blockType === 'video' && block.content && block.content.url" class="block-video">
                      <div class="video-wrapper" style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;max-width:100%;">
                        <iframe :src="block.content.url" style="position:absolute;top:0;left:0;width:100%;height:100%;" frameborder="0" allowfullscreen></iframe>
                      </div>
                    </div>
                    <!-- 图片集区块 -->
                    <div v-if="block.blockType === 'images' && block.content && block.content.images" class="block-images">
                      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;">
                        <figure v-for="(img, ii) in block.content.images" :key="ii" style="margin:0;">
                          <img :src="img.url" :alt="img.caption || ''" style="width:100%;height:auto;border-radius:8px;">
                          <figcaption v-if="img.caption" style="margin-top:8px;font-size:14px;color:#666;text-align:center;">{{ img.caption }}</figcaption>
                        </figure>
                      </div>
                    </div>
                    <!-- 文件下载区块 — 相关资料样式 -->
                    <div v-if="block.blockType === 'files' && block.content && block.content.files" class="block-files" id="product-document">
                      <!-- 三列布局 -->
                      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:24px;">
                        <!-- 技术文件列 -->
                        <div>
                          <h3 style="font-size:1.5rem;font-family:'Din Next Slab Pro Bold',sans-serif;color:#A52458;margin:0 0 16px 0;padding:0 0 8px 0;border-bottom:1px solid #e0d5d5;">技术文件</h3>
                          <ul style="list-style:none;padding:0;margin:0;">
                            <template v-for="(file, fi) in block.content.files" :key="'tds-'+fi">
                              <li v-if="isTdsDoc(file)" style="margin-bottom:10px;">
                                <a v-if="file.isPublic !== false" :href="file.url" target="_blank" style="display:flex;align-items:flex-start;gap:8px;color:#333;text-decoration:none;font-size:14px;line-height:1.5;">
                                  <span style="flex-shrink:0;width:10px;height:10px;border-radius:50%;background:#A52458;display:inline-block;margin-top:6px;"></span>
                                  <span>{{ file.title || file.url }}</span>
                                </a>
                                <span v-else style="display:flex;align-items:flex-start;gap:8px;color:#bbb;font-size:14px;line-height:1.5;cursor:not-allowed;">
                                  <span style="flex-shrink:0;width:10px;height:10px;border-radius:50%;background:#ccc;display:inline-block;margin-top:6px;"></span>
                                  <span>🔒 {{ file.title || file.url }}</span>
                                </span>
                              </li>
                            </template>
                            <li v-if="!hasTdsDocs(block.content.files)" style="color:#999;font-size:14px;">暂无技术文件</li>
                          </ul>
                        </div>
                        <!-- 产品手册列 -->
                        <div>
                          <h3 style="font-size:1.5rem;font-family:'Din Next Slab Pro Bold',sans-serif;color:#A52458;margin:0 0 16px 0;padding:0 0 8px 0;border-bottom:1px solid #e0d5d5;">产品手册</h3>
                          <ul style="list-style:none;padding:0;margin:0;">
                            <template v-for="(file, fi) in block.content.files" :key="'bro-'+fi">
                              <li v-if="isBrochureDoc(file)" style="margin-bottom:10px;">
                                <a v-if="file.isPublic !== false" :href="file.url" target="_blank" style="display:flex;align-items:flex-start;gap:8px;color:#333;text-decoration:none;font-size:14px;line-height:1.5;">
                                  <span style="flex-shrink:0;width:10px;height:10px;border-radius:50%;background:#A52458;display:inline-block;margin-top:6px;"></span>
                                  <span>{{ file.title || file.url }}</span>
                                </a>
                                <span v-else style="display:flex;align-items:flex-start;gap:8px;color:#bbb;font-size:14px;line-height:1.5;cursor:not-allowed;">
                                  <span style="flex-shrink:0;width:10px;height:10px;border-radius:50%;background:#ccc;display:inline-block;margin-top:6px;"></span>
                                  <span>🔒 {{ file.title || file.url }}</span>
                                </span>
                              </li>
                            </template>
                            <li v-if="!hasBrochureDocs(block.content.files)" style="color:#999;font-size:14px;">暂无产品手册</li>
                          </ul>
                        </div>
                        <!-- 配方资料列 -->
                        <div>
                          <h3 style="font-size:1.5rem;font-family:'Din Next Slab Pro Bold',sans-serif;color:#A52458;margin:0 0 16px 0;padding:0 0 8px 0;border-bottom:1px solid #e0d5d5;">配方资料</h3>
                          <ul style="list-style:none;padding:0;margin:0;">
                            <template v-for="(file, fi) in block.content.files" :key="'for-'+fi">
                              <li v-if="isFormulaDoc(file)" style="margin-bottom:10px;">
                                <a v-if="file.isPublic !== false" :href="file.url" target="_blank" style="display:flex;align-items:flex-start;gap:8px;color:#333;text-decoration:none;font-size:14px;line-height:1.5;">
                                  <span style="flex-shrink:0;width:10px;height:10px;border-radius:50%;background:#A52458;display:inline-block;margin-top:6px;"></span>
                                  <span>{{ file.title || file.url }}</span>
                                </a>
                                <span v-else style="display:flex;align-items:flex-start;gap:8px;color:#bbb;font-size:14px;line-height:1.5;cursor:not-allowed;">
                                  <span style="flex-shrink:0;width:10px;height:10px;border-radius:50%;background:#ccc;display:inline-block;margin-top:6px;"></span>
                                  <span>🔒 {{ file.title || file.url }}</span>
                                </span>
                              </li>
                            </template>
                            <li v-if="!hasFormulaDocs(block.content.files)" style="color:#999;font-size:14px;">暂无配方资料</li>
                          </ul>
                        </div>
                      </div>
                    </div>
                    <!-- 左：文字/图片/视频，右：文字/视频 -->
                    <div v-if="block.blockType === 'imagetext' && block.content" class="block-imagetext">
                      <div class="block-imagetext__layout">
                        <div class="block-imagetext__col">
                          <!-- 左：富文本 -->
                          <div v-if="block.content.leftType === 'richtext' && block.content.leftHtml" v-html="block.content.leftHtml" class="block-content"></div>
                          <!-- 左：图片 -->
                          <div v-if="block.content.leftType === 'image' && block.content.leftUrl">
                            <img :src="block.content.leftUrl" :alt="block.title || ''" style="width:100%;height:auto;border-radius:8px;display:block;">
                          </div>
                          <!-- 左：视频 -->
                          <div v-if="block.content.leftType === 'video' && block.content.leftUrl" class="video-wrapper" style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;max-width:100%;">
                            <iframe :src="convertVideoUrl(block.content.leftUrl)" style="position:absolute;top:0;left:0;width:100%;height:100%;" frameborder="0" allowfullscreen></iframe>
                          </div>
                        </div>
                        <div class="block-imagetext__col">
                          <!-- 右：文字 -->
                          <div v-if="block.content.rightType === 'text' && block.content.rightText" style="white-space:pre-line;font-size:16px;line-height:1.7;color:#555;">{{ block.content.rightText }}</div>
                          <!-- 右：视频 -->
                          <div v-if="block.content.rightType === 'video' && block.content.rightUrl" class="video-wrapper" style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;max-width:100%;">
                            <iframe :src="convertVideoUrl(block.content.rightUrl)" style="position:absolute;top:0;left:0;width:100%;height:100%;" frameborder="0" allowfullscreen></iframe>
                          </div>
                        </div>
                      </div>
                    </div>

  <script>
    var inCart = false;
    // 获取对话框元素和关闭按钮
    var dialog = document.getElementById('dialog');
    var dialogClose = document.getElementById('dialog-close');
    var dialogMessage = document.getElementById('dialog-message');

    // 替代alert函数
    function showDialog(message) {
      dialogMessage.innerHTML = message;
      dialog.style.display = 'block';
    }

    // 关闭对话框
    dialogClose.addEventListener('click', function () {
      dialog.style.display = 'none';
      if (!inCart) {
        var applySampleBt = document.getElementById('applySampleBt');
        var seeCartBt = document.getElementById('seeCartBt');
        seeCartBt.style.display = 'none';
        applySampleBt.style.display = 'flex';

    });

  </script>

  <script>
    const params = new URLSearchParams(window.location.search);
    var id = params.get('id');
    if (id == null) {
      id = 10920;
    }
    var isLogin = checkLoginStatus();
    let userEnabled = localStorage.getItem("userEnabled");
    var t = {};
    const { createApp, reactive, ref, nextTick } = Vue;
    const app = createApp({
      data() {
        return { productDetail: null }
      },
      setup() {
        const data = reactive({
          worldList: '',
          productDetail: {}, inCart: false, inFav: false,
          contentBlocks: [],
          productSpecs: null,
          relatedContents: [],
          isLoginedAndEnabled: false,
          loading: true,
        });
        if (localStorage.getItem('isLoggedIn') == 'true' && localStorage.getItem('userEnabled') == "1") {
          data.isLoginedAndEnabled = true;
        }

        const addProductFav = function (productDetail) {
          if (!checkLoginStatus()) {
            showDialog("请先<a href=\"/account.html\">登录</a>");
            return;
          }
          if (data.inFav) return;
          GatteAPI.Favorite.add({
            itemType: 'pc_ingredient',
            itemId: parseInt(id)
          }).then(function (res) {
            data.inFav = true;
            showDialog("已添加到收藏");
          }).catch(function (err) {
            console.error('收藏失败:', err);
            showDialog("收藏失败，请重试");
          });
        };

        const addCart = function (item) {
          if (!checkLoginStatus()) {
            showDialog("您可以<a href=\"/account.html#registration\">注册会员</a>后申请样品，或者点\"<a href=\"/contact-form.html\">申请样品/资料</a>\"直接申请！");
            return;
          }
          GatteAPI.Cart.add({
            productType: 'pc_ingredient',
            productId: parseInt(id),
            productName: data.productDetail.goodsName || data.productDetail.name || ''
          }).then(function (res) {
            data.inCart = true;
            var applySampleBt = document.getElementById('applySampleBt');
            var seeCartBt = document.getElementById('seeCartBt');
            if (applySampleBt) applySampleBt.style.display = 'none';
            if (seeCartBt) seeCartBt.style.display = 'block';
            showDialog("已添加到购物车");
            if (typeof getCartNum === 'function') getCartNum();
          }).catch(function (err) {
            console.error('添加购物车失败:', err);
            showDialog("添加购物车失败，请重试");
          });
        };

        // 获取产品详情
        const getProductDetail = function () {
          data.loading = true;
          GatteAPI.PcProduct.detail(parseInt(id)).then(function (res) {
            var product = res.data || res;
            data.productDetail = {
              ID: product.id,
              goodsName: product.name,
              subtitle: product.inciName || '',
              goodsCarousel: product.imageUrl || '',
              goodsIntro: product.description || '',
              dosage: product.dosage || '',
              tagline: product.tagline || '',
              videoUrl: product.videoUrl || '',
              bg: product.detailImageUrl ? 'background-image: url(' + product.detailImageUrl + ')' : (product.imageUrl ? 'background-image: url(' + product.imageUrl + ')' : ''),
              url: '/personal-care/product-finder/product-detail.html?id=' + product.id,
              favUrl: '/account.html?url=/personal-care/product-finder/product-detail.html?id=' + id,
            };
            // 加载产品规格（specInfo 是 JSON 字符串或对象）
            if (product.specInfo) {
              var spec = typeof product.specInfo === 'string' ? JSON.parse(product.specInfo) : product.specInfo;
              data.productSpecs = spec;
            }
            data.loading = false;
            // 加载关联文档
            if (product.id) {
              // 加载内容区块
              if (product.id) loadContentBlocks(product.id);
              // 加载相关推荐
              if (product.id) loadRelatedProducts(product.id);
            }
          }).catch(function (err) {
            console.error('获取产品详情失败:', err);
            data.loading = false;
          });
        };

        // 加载内容区块（详情页模块化区块）
        const loadContentBlocks = function (productId) {
          GatteAPI.Blocks.list({ productId: productId, productType: 'pc' }).then(function (res) {
            var body = res.data || res;
            if (body && body.list) {
              data.contentBlocks = body.list;
            } else if (Array.isArray(body)) {
              data.contentBlocks = body;
            }
            // 自动同步文件区块中文档的最新权限状态
            var blocks = data.contentBlocks || [];
            for (var bi = 0; bi < blocks.length; bi++) {
              var block = blocks[bi];
              if (block.blockType === 'files' && block.content && block.content.files) {
                for (var fi = 0; fi < block.content.files.length; fi++) {
                  var file = block.content.files[fi];
                  if (file.fileId) {
                    (function(f) {
                      GatteAPI.Document.detail(f.fileId).then(function(res) {
                        var doc = res.data || res;
                        if (doc && doc.isPublic !== undefined) {
                          f.isPublic = doc.isPublic;
                        }
                      }).catch(function() {});
                    })(file);
                  }
                }
              }
            }
          }).catch(function (err) {
            console.error('加载内容区块失败:', err);
          });
        };

        // 加载相关推荐产品
        const loadRelatedProducts = function (productId) {
          GatteAPI.PcProduct.related(productId).then(function (res) {
            var body = res.data || res;
            var items = body && body.list ? body.list : (Array.isArray(body) ? body : []);
            data.relatedContents = items.map(function (p) {
              return {
                title: p.name,
                summary: p.description || '',
                thumb: p.imageUrl || '/static/images/default-thumb.jpg',
                url: '/personal-care/product-finder/product-detail.html?id=' + p.id,
                category: 'pc_ingredient',
              };
            });
          }).catch(function (err) {
            console.error('加载相关推荐失败:', err);
          });
        };

        // 初始化 — 获取产品详情
        getProductDetail();

        // 检查购物车
        if (isLogin) {
          GatteAPI.Cart.list().then(function (res) {
            var cartItems = (res.list || res || []);
            for (var i = 0; i < cartItems.length; i++) {
              if (cartItems[i].productId == id) {
                data.inCart = true;
                break;
              }
            }
          }).catch(function () {});

          // 检查收藏
          GatteAPI.Favorite.list({ itemType: 'pc_ingredient', limit: 100 }).then(function (res) {
            var favItems = (res.list || res || []);
            for (var i = 0; i < favItems.length; i++) {
              if (favItems[i].itemId == id) {
                data.inFav = true;
                break;
              }
            }
          }).catch(function () {});
        }

        // 滑块初始化（保持原有DOM逻辑）
        nextTick(function () {
          function mm(s) {
            var r = 1400, n = 1200, o = 1024, d = 768, l = 576;
            t = {
              init: function () {
                var e = $('.js-product-slider');
                e.each(function () {
                  var t = $(this).find('.js-product-slide').length, s = !1,
                    e = $(this), r = $(this).parent().find('.js-slick-next'),
                    n = $(this).parent().find('.js-slick-prev'),
                    o = $(this).parent().find('.js-slick-dots-wrapper');
                  if (t > 1) { s = !0; }
                });
              }
            };
            var e = {
              init: function () {
                var n = $('.js-related-product'), r = $('.js-related-product-slider'),
                  t = $('.js-related-product-slider .c-card').length, e = !1;
                $(window).on('load resize', function () {
                  if ($(window).width() > 1220 && t > 3) { e = !0; }
                  else if ($(window).width() > 576 && t > 2) { e = !0; }
                  else if ($(window).width() < 576 && t > 1) { e = !0; }
                  if (n.length && !r.hasClass('slick-initialized') && e) {
                    r.slick({
                      accessibility: !0, infinite: !1, centerMode: !1,
                      slidesToShow: 3, slidesToScroll: 1, dots: !0,
                      nextArrow: $('.js-related-product .js-slick-next'),
                      prevArrow: $('.js-related-product .js-slick-prev'),
                      appendDots: $('.js-related-product .js-slick-dots-wrapper'),
                      variableWidth: !0,
                      responsive: [
                        { breakpoint: 9999, settings: { slidesToShow: 3 } },
                        { breakpoint: 1220, settings: { slidesToShow: 2 } },
                        { breakpoint: 576, settings: { slidesToShow: 1 } }
                      ]
                    });
                  }
                });
              }
            };
            t.init();
            e.init();
          }
          mm();
        });

        const loading = ref(false);
        const items = ref([]);

        // 从 contentBlocks 中按标题取区块的 HTML 内容
        function getBlockContent(title) {
          for (var i = 0; i < data.contentBlocks.length; i++) {
            var b = data.contentBlocks[i];
            if (b.title === title && b.blockType === 'richtext' && b.content && b.content.html) {
              return b.content.html;
            }
          }
          return '';
        }

        // 规格文字：将 \n 换行为 <br>，保持前端换行显示
        function formatSpecText(text) {
          if (!text) return '';
          return text.replace(/\n/g, '<br>');
        }

        // 视频链接转换：支持 iframe 代码 / B站链接 / 直接嵌入链接
        function convertVideoUrl(url) {
          if (!url) return '';
          // 1. 如果是 iframe 标签，提取 src
          var match = url.match(/<iframe[^>]*\ssrc=["']([^"']+)["']/i);
          if (match) return match[1];
          // 2. B站视频页 → 嵌入链接
          //    https://www.bilibili.com/video/BVxxx → //player.bilibili.com/player.html?bvid=BVxxx
          var bvMatch = url.match(/(?:https?:)?\/\/(?:www\.)?bilibili\.com\/video\/(BV[a-zA-Z0-9]+)/i);
          if (bvMatch) return '//player.bilibili.com/player.html?bvid=' + bvMatch[1] + '&autoplay=0';
          // 3. B站嵌入链接已含 player.bilibili.com，直接返回
          if (url.indexOf('player.bilibili.com') !== -1) return url;
          // 4. 其他直接返回
          return url;
        }

        var _isTdsDoc = function(f) { return f.title && (f.title.indexOf('TDS') !== -1 || f.title.indexOf('技术') !== -1 || f.title.indexOf('数据') !== -1); };
        var _isBrochureDoc = function(f) { return f.title && (f.title.indexOf('手册') !== -1 || f.title.indexOf('Brochure') !== -1 || f.title.indexOf('介绍') !== -1); };
        var _hasDocs = function(files, fn) { if (!files) return false; for (var i = 0; i < files.length; i++) { if (fn(files[i])) return true; } return false; };
        return {
          data, addProductFav, addCart, getBlockContent, formatSpecText, convertVideoUrl,
          isTdsDoc: _isTdsDoc,
          isBrochureDoc: _isBrochureDoc,
          isFormulaDoc: function(f) { return !_isTdsDoc(f) && !_isBrochureDoc(f); },
          hasTdsDocs: function(files) { return _hasDocs(files, _isTdsDoc); },
          hasBrochureDocs: function(files) { return _hasDocs(files, _isBrochureDoc); },
          hasFormulaDocs: function(files) { return _hasDocs(files, function(f) { return !_isTdsDoc(f) && !_isBrochureDoc(f); }); }
        };
      }
    });
    app.mount("#app");

    function htmlencode(s) {
      var div = document.createElement('div');
      div.appendChild(document.createTextNode(s));
      return div.innerHTML;
    }
    function htmldecode(s) {
      var div = document.createElement('div');
      div.innerHTML = s;
      return div.innerText || div.textContent;
    }
    /*3.用正则表达式实现html转码*/
    function htmlEncodeByRegExp(str) {
      var s = "";
      if (str.length == 0) return "";
      s = str.replace(/&/g, "&");
      s = s.replace(/</g, "<");
      s = s.replace(/>/g, ">");
      s = s.replace(/ /g, " ");
      s = s.replace(/\'/g, "'");
      s = s.replace(/\"/g, '"');
      return s;
    }
    /*4.用正则表达式实现html解码*/
    function htmlDecodeByRegExp(str) {
      var s = "";
      if (str.length == 0) return "";
      s = str.replace(/&/g, "&");
      s = s.replace(/</g, "<");
      s = s.replace(/>/g, ">");
      s = s.replace(/ /g, " ");
      s = s.replace(/'/g, "\'");
      s = s.replace(/"/g, "\"");
      return s;
    }
    function sleep(time) {
      return new Promise((resolve) => setTimeout(resolve, time));
    }
    function checkLoginStatus() {
      if (localStorage.getItem('isLoggedIn') === 'true') {
        return true;
      } else {
        return false;
      }
    }
  </script>

      var api = "/api/mallShoppingCartItem/getMallShoppingCartItemList?1=1";
      if (checkLoginStatus()) {
        $.ajax({
          url: api,
          type: "GET",  //默认值: "GET"请求方式 ("POST" 或 "GET")
          dataType: "json",   //服务器返回的类型json,xml,text,html等
          contentType: "application/json",
          headers: {
            Accept: 'application/json, text/plain, */*'
          },
          success: function (result, status, xhr) {
            $("#cartNum").html(result.data.total);
          },
          error: function (xhr, status, error) {
          }
        });
      } else {
        $("#cartNum").html(0);
      }
    }
  </script>

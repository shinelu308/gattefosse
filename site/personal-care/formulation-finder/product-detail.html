    <script>
      // ★ 与参考页一致：全局变量和函数
      var inCart = false;
      var dialog = document.getElementById('dialog');
      var dialogClose = document.getElementById('dialog-close');
      var dialogMessage = document.getElementById('dialog-message');
    
      function showDialog(message) {
        dialogMessage.innerHTML = message;
        dialog.style.display = 'block';
      }

      function checkLoginStatus() {
        return localStorage.getItem('isLoggedIn') === 'true';
      }

      function _escape(str) {
        var div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }
    
      dialogClose.addEventListener('click', function () {
        dialog.style.display = 'none';
        var applyBt = document.getElementById('applySampleBt');
        var seeBt = document.getElementById('seeCartBt');
        if (seeBt) seeBt.style.display = 'none';
        if (applyBt) applyBt.style.display = 'flex';
      });
    </script>
    <script>
        const params = new URLSearchParams(window.location.search);
        var id = params.get('id');
        if (id == null) {
            id = 1;
        }
        const { createApp, reactive, ref, nextTick } = Vue;
        const app = createApp({
            data() {
                return { productDetail: null }
            },
            setup() {
                const data = reactive({
                    productDetail: {}, inFav: false,
                    relatedProducts: [],
                    relatedContents: [],
                    loading: true
                });

                const addProductFav = function (productDetail) {
                    if (!checkLoginStatus()) {
                        showDialog("请先<a href=\"/account.html\">登录</a>");
                        return;
                    }
                    if (data.inFav) return;
                    GatteAPI.Favorite.add({
                        itemType: 'formulation',
                        itemId: parseInt(id)
                    }).then(function () {
                        data.inFav = true;
                        showDialog("已添加到收藏");
                    }).catch(function (err) {
                        console.error('收藏失败:', err);
                        showDialog("收藏失败，请重试");
                    });
                };

                // 获取配方详情
                const getProductDetail = function () {
                    data.loading = true;
                    GatteAPI.Formulation.detail(parseInt(id)).then(function (res) {
                        var f = res.data || res;
                        var mainContent = '';
                        if (f.compositionText) {
                            mainContent += '<h3>成分</h3><div>' + f.compositionText + '</div>';
                        }
                        if (f.preparationSteps) {
                            mainContent += '<h3>制备步骤</h3><div>' + f.preparationSteps + '</div>';
                        }
                        data.productDetail = {
                            ID: f.id,
                            goodsName: f.name,
                            subtitle: f.code || '',
                            description: f.description || '',
                            imageUrl: f.imageUrl || '',
                            bg: f.imageUrl ? 'background-image: url(' + f.imageUrl + ')' : '',
                            url: '/personal-care/formulation-finder/product-detail.html?id=' + f.id,
                            favUrl: '/account.html?url=/personal-care/formulation-finder/product-detail.html?id=' + id,
                            pdfUrl: '',
                            claims: '',
                            picto: '',
                            movieUrl: '',
                            mainContent: mainContent,
                            goodsCategoryId: ''
                        };
                        data.loading = false;
                    }).catch(function (err) {
                        console.error('获取配方详情失败:', err);
                        data.loading = false;
                    });
                };

                getProductDetail();

                return {
                    data,
                    getProductDetail,
                    addProductFav
                };
            },
        });
        let result = app.mount("#app");
    </script>

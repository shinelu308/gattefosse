  <script>
    const params = new URLSearchParams(window.location.search);
    $(document).ready(function () {
      $("#header").load("/header.html", function () {
        let tmp = checkLoginStatus();
        if (!tmp) {
          $("#collapseAccMenu").load("/account-menu.html");
        } else {
          $("#collapseAccMenu").load("/account-menu-after-login.html");
        }
      });
      $("#footer").load("/footer.html");
      $("#quickLinks").load("/quickLinks.html");
      $("#worldList").load("/world.html");
    });
    
    // 获取对话框元素和关闭按钮
    var dialog = document.getElementById('dialog');
    var dialogClose = document.getElementById('dialog-close');
    var dialogMessage = document.getElementById('dialog-message');

    // 替代alert函数
    function showDialog(message) {
      dialogMessage.innerHTML = message;
      dialog.style.display = 'block';
    }

    // 关闭对话框
    dialogClose.addEventListener('click', function () {
      dialog.style.display = 'none';
    });

    $("#edit-submit--2").click(function () {
      var raw = {
        name: $("#edit-first-name--2").val(),
        phone: $('#edit-phone--2').val(),
        email: $('#edit-email--2').val(),
        companyName: $('#edit-company--2').val(),
        address: $('#edit-address--2').val(),
        department: $('#edit-department--2').val(),
        market: $('#edit-business-unit--2').val(),
        sampleList: $('#sampleList').val(),
        comment: $('#edit-your-message--2').val(),
        dft: true,
      };
      var allowSubmit = true;      
      if (raw.comment == '') {
        $("#edit-your-message--2-error").css('display', 'block');
        $("#edit-your-message--2").focus();
        allowSubmit = false;
      }
      if ($("#edit-business-unit--2").val() == '') {
        $("#edit-business-unit--2-error").css('display', 'block');
        $("#edit-business-unit--2").focus();
        allowSubmit = false;
      }
      if ($("#edit-department--2").val() == '') {
        $("#edit-department--2-error").css('display', 'block');
        $("#edit-department--2").focus();
        allowSubmit = false;
      } 
      if ($("#edit-address--2").val() == '') {
        $("#edit-address--2-error").css('display', 'block');
        $("#edit-address--2").focus();
        allowSubmit = false;
      }
      if ($("#edit-company--2").val() == '') {
        $("#edit-company--2-error").css('display', 'block');
        $("#edit-company--2").focus();
        allowSubmit = false;
      }
      if ($("#edit-email--2").val() == '') {
        $("#edit-email--2-error").css('display', 'block');
        $("#edit-email--2").focus();
        allowSubmit = false;
      }else {
         // 新增：判断邮箱格式
        var email = $("#edit-email--2").val() || '';
        var emailPattern = /^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$/;
        if (!emailPattern.test(email)) {
          showDialog("请输入正确的邮箱地址");
          $("#edit-email--2").focus();
          allowSubmit = false;
        }
        // 新增：判断邮箱后缀
        var email = $("#edit-email--2").val() || '';
        var forbiddenDomains = ['163.com', '126.com', 'qq.com', '139.com', '189.cn'];
        if (forbiddenDomains.some(function(domain) { return email.endsWith('@' + domain); })) {
          showDialog("请输入公司邮箱");
          $("#edit-email--2").focus();
          allowSubmit = false;
        }
      }
      if ($("#edit-phone--2").val() == '') {
        $("#edit-phone--2-error").css('display', 'block');
        $("#edit-phone--2").focus();
        allowSubmit = false;
      }
      if ($("#edit-first-name--2").val() == '') {
        $("#edit-first-name--2-error").css('display', 'block');
        $("#edit-first-name--2").focus();
        allowSubmit = false;
      }
      if (raw.comment != '') {
        $("#edit-your-message--2-error").css('display', 'none');
      }

      var payload = {

        message: message,
        productInterest: productInterest
      };

      }).catch(function (err) {

        showDialog("申请提交失败");
        allowSubmit = false;
      });

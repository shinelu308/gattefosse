    <script setup>
        const params = new URLSearchParams(window.location.search);
        const tokenStr = params.get('_token');
        const goodsCategoryId = params.get('i'); // "关联产品分类ID"
        var w = params.get('keyword'); //搜索关键词
        var exp = params.get('expertise'); //搜索关键词
        var atype = params.get('atype'); //0所有，1新闻，2活动
        var countryId = params.get('countryId');
        var curPage = params.get('page');
        var curUrl = window.location.href;
        var hasParam = curUrl.indexOf('?');
        var hasTypeParam = curUrl.indexOf('i=');
        var total = 0, count_0 = 0, count_1 = 0, count_2 = 0;
        const { createApp, reactive, getCurrentInstance, ref, router, nextTick } = Vue;
        const app = createApp({
            setup() {
                const data = reactive({
                    name: "aa",
                    formData: [],
                    total: total,
                    count_0: count_0,
                    count_1: count_1,
                    count_2: count_2,
                    cur_page: curPage == null ? 1 : curPage,
                    page_size: 10000,
                    total_page: 1,
                    prev_url: '',
                    next_url: '',
                    keyword: w,
                    type: atype,
                    goodsCategoryId: goodsCategoryId,
                    hasParam: hasParam,
                    hasTypeParam: hasTypeParam,
                });
                // 查询
                const getTableData = () => {
                    GatteAPI.Order.list({ limit: 20 }).then((res) => {
                        const orders = res.data.list;
                        if (!orders || orders.length === 0) {
                            data.formData = [];
                            return;
                        }
                        data.formData = orders.map((order) => {
                            // 构建 sampleList 显示字符串
                            const itemLabels = (order.items || []).map((item) => {
                                return (item.productType || '') + '-' + item.productId + ' x' + item.quantity;
                            });
                            return {
                                ...order,
                                sampleList: itemLabels.join(', '),
                                CreatedAt: order.submittedAt ? order.submittedAt.substring(0, 10) : '',
                            };
                        });
                    }).catch((err) => {
                        console.log(err);
                    });
                }
                getTableData()
                return {
                    data,
                };
            }
        });
        let result = app.mount("#app");
    </script>

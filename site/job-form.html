  <script setup>
    const params = new URLSearchParams(window.location.search);

    const { createApp, reactive, getCurrentInstance, ref, router, nextTick } = Vue;
    const app = createApp({
      data() {
        return { formData: null, name: "dddd", email: "hhhhhh@fffff.com" }
      },
      setup() {
        const data = reactive({
          formData: [],
        });
        getInformation();
        //方法1
        function getInformation() {
          //方法的实现
        }
        const selectedFile = ref(null);

        const handleFileChange = (event) => {
          selectedFile.value = event.target.files[0];
        };

        const uploadFile = async () => {
          if (!selectedFile.value) {
            alert('请选择一个文件');
            return;
          }

          const formData = new FormData();
          formData.append('file', selectedFile.value);

          try {
            const response = await fetch(GatteAPI.BASE_URL + '/api/careers/upload', {
              method: 'POST',
              body: formData,
            })
            if (response.ok) {
              alert('上传成功');
              const data = await response.json();
              filesUrl = (data.data && (data.data.url || data.data.file && data.data.file.url)) || data.url || '';
            } else {

            }
            nextTick(() => {
              console.log('上传OK');
            })
          } catch (error) {
            console.log(error);
          }
        };
        return {
          data,
          uploadFile, handleFileChange
        };
      },
    });
    let result = app.mount("#app");
  </script>

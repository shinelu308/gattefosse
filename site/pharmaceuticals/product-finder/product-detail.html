  <!-- ★ 与个人护理一致：全局函数/变量在 Vue 之前 -->
  <script>
    var inCart = false;
    var _dialog = document.getElementById('dialog');
    var _dialogClose = document.getElementById('dialog-close');
    var _dialogMessage = document.getElementById('dialog-message');

    function showDialog(message) {
      _dialogMessage.innerHTML = message;
      _dialog.style.display = 'block';
    }

    function checkLoginStatus() {
      return localStorage.getItem('isLoggedIn') === 'true';
    }

    function _escape(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    _dialogClose.addEventListener('click', function () {
      _dialog.style.display = 'none';
      var applyBt = document.getElementById('applySampleBt');
      var seeBt = document.getElementById('seeCartBt');
      if (seeBt) seeBt.style.display = 'none';
      if (applyBt) applyBt.style.display = 'flex';
    });
  </script>

  <!-- 统一 Vue app 脚本（与个人护理 product-detail.html 同架构） -->
  <script>
    console.log('[DIAG] === Pharma Vue app (data+setup hybrid) ===');

    // ====== 从 URL 提取 slug（支持多种格式）======
    var pharmaSlug = '';
    var _pathMatch = window.location.pathname.match(/\/([^/]+)\.html$/);
    if (_pathMatch && _pathMatch[1] !== 'product-detail') {
      pharmaSlug = decodeURIComponent(_pathMatch[1]);
    }
    if (!pharmaSlug) {
      var _sMatch = window.location.search.match(/[?&]slug=([^&#]+)/);
      if (_sMatch) { pharmaSlug = decodeURIComponent(_sMatch[1]); }
    }
    if (!pharmaSlug) {
      var _idMatch = window.location.search.match(/[?&]id=([^&#]+)/);
      if (_idMatch) { pharmaSlug = _idMatch[1]; }
    }
    console.log('[DIAG] 最终 slug:', JSON.stringify(pharmaSlug));

    // ====== Vue app（data() + setup() 混合模式，与个人护理一致）======
    const { createApp, reactive } = Vue;
    const app = createApp({
      data: function () {
        return { productDetail: null };
      },
      setup: function () {
        const data = reactive({
          pharmaHeaderBg: '',
          productName: '',
          productDescription: '',
          showDescription: true,
          blocksHtml: '',
          docHtml: '',
          inFav: false,
          inCart: false,
          _productData: null,
          _slug: pharmaSlug
        });

        // ====== 加载产品（与个人护理 getProductDetail 一致）======
        function loadProduct(slug) {
          GatteAPI.PharmaProduct.detail(slug)
            .then(function (resp) {
              var product = resp.data;
              if (!product || !product.id) {
                console.warn('[DIAG] ❌ 产品未找到:', slug);
                return;
              }
              data._productData = product;
              data.productName = product.name || '';
              document.title = (product.name || '产品详情') + ' - 产品详情 | 嘉法狮';

              // 头部大图（与个人护理 bg 格式完全一致）
              var imgUrl = product.detailImageUrl || product.imageUrl;
              if (imgUrl) {
                data.pharmaHeaderBg = 'background-image: url(' + imgUrl + ')';
              }
              console.log('[DIAG] ✅ 产品加载:', product.name, '| bg:', data.pharmaHeaderBg);

              // 产品描述
              if (product.description) {
                data.productDescription = '<p>' + _escape(product.description) + '</p>';
                data.showDescription = true;
              } else {
                data.showDescription = false;
              }

              // 加载内容区块
              if (product.id) loadBlocks(product.id);
              // 加载文档
              if (product.id) loadDocs(product.id);
            })
            .catch(function (e) {
              console.warn('[DIAG] ❌ 加载失败:', e.message || e);
            });
        }

        // ====== 加载内容区块 ======
        function loadBlocks(productId) {
          GatteAPI.PharmaProduct.blocks(productId)
            .then(function (resp) {
              if (!resp || !resp.data) return;
              var blocks = resp.data.list || resp.data || [];
              console.log('[DIAG] Blocks:', blocks.length);
              if (blocks.length === 0) { data.blocksHtml = ''; return; }

              var html = '';
              blocks.forEach(function (block) {
                var content = typeof block.content === 'string'
                  ? JSON.parse(block.content) : (block.content || {});
                var item = '';

                switch (block.blockType) {
                  case 'spec':
                    var rows = content.rows || [];
                    if (rows.length === 0) return;
                    var rh = '';
                    rows.forEach(function (r) {
                      if (!r.label) return;
                      rh += '<div class="spec-row"><span class="spec-label">' + _escape(r.label) + '</span><span class="spec-value">' + (r.value ? r.value : '') + '</span></div>';
                    });
                    if (rh) {
                      item = '<div class="s-product-content__item">'
                        + (block.title ? '<h2 class="s-product-content__title">' + _escape(block.title) + '</h2>' : '')
                        + '<div class="spec-table">' + rh + '</div></div>';
                    }
                    break;
                  case 'richtext':
                    if (!content.html) return;
                    item = '<div class="s-product-content__item">'
                      + (block.title ? '<h2 class="s-product-content__title">' + _escape(block.title) + '</h2>' : '')
                      + '<div class="s-product-content__txt">' + content.html + '</div></div>';
                    break;
                  case 'video':
                    if (!content.url) return;
                    item = '<div class="s-product-content__item">'
                      + (block.title ? '<h2 class="s-product-content__title">' + _escape(block.title) + '</h2>' : '')
                      + '<div class="s-product-content__txt">'
                      + '<div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;">'
                      + '<iframe src="' + _escape(content.url) + '" style="position:absolute;top:0;left:0;width:100%;height:100%;border:0;" allowfullscreen></iframe>'
                      + '</div></div></div>';
                    break;
                  case 'images':
                    var imgs = content.images || [];
                    if (imgs.length === 0) return;
                    var ih = '';
                    imgs.forEach(function (img) {
                      ih += '<figure style="margin:0 0 16px;">'
                        + '<img src="' + _escape(img.url) + '" alt="' + _escape(img.caption || '') + '" style="max-width:100%;border-radius:4px;" />'
                        + (img.caption ? '<figcaption style="font-size:13px;color:#666;margin-top:6px;text-align:center;">' + _escape(img.caption) + '</figcaption>' : '')
                        + '</figure>';
                    });
                    item = '<div class="s-product-content__item">'
                      + (block.title ? '<h2 class="s-product-content__title">' + _escape(block.title) + '</h2>' : '')
                      + '<div class="s-product-content__txt">' + ih + '</div></div>';
                    break;
                  case 'imagetext':
                    item = '<div class="s-product-content__item">'
                      + (block.title ? '<h2 class="s-product-content__title">' + _escape(block.title) + '</h2>' : '')
                      + '<div class="s-product-content__txt">'
                      + '<div style="display:flex;gap:24px;align-items:flex-start;"><div style="flex:1;">';
                    if (content.leftType === 'image' && content.leftUrl) item += '<img src="' + _escape(content.leftUrl) + '" style="max-width:100%;" />';
                    else if (content.leftType === 'video' && content.leftUrl) item += '<div style="position:relative;padding-bottom:56.25%;height:0;"><iframe src="' + _escape(content.leftUrl) + '" style="position:absolute;top:0;left:0;width:100%;height:100%;border:0;" allowfullscreen></iframe></div>';
                    else if (content.leftHtml) item += content.leftHtml;
                    item += '</div><div style="flex:1;">';
                    if (content.rightType === 'video' && content.rightUrl) item += '<div style="position:relative;padding-bottom:56.25%;height:0;"><iframe src="' + _escape(content.rightUrl) + '" style="position:absolute;top:0;left:0;width:100%;height:100%;border:0;" allowfullscreen></iframe></div>';
                    else if (content.rightText) item += '<p>' + content.rightText + '</p>';
                    item += '</div></div></div></div>';
                    break;
                }
                if (item) html += item;
              });
              data.blocksHtml = html;
              console.log('[DIAG] ✅ Blocks 渲染完成');
            })
            .catch(function (e) {
              console.warn('[DIAG] 加载 blocks 失败:', e.message || e);
            });
        }

        // ====== 加载文档 ======
        function loadDocs(productId) {
          GatteAPI.PharmaProduct.documents(productId)
            .then(function (resp) {
              if (!resp || !resp.data) { console.log('[DIAG] 无文档'); return; }
              var docs = resp.data;
              if (!Array.isArray(docs) || docs.length === 0) { console.log('[DIAG] 文档为空'); return; }

              var groups = {};
              docs.forEach(function (d) {
                var t = d.type || '\u5176\u4ed6';
                if (!groups[t]) groups[t] = [];
                groups[t].push(d);
              });

              var html = '<h2 class="s-product-content__title">相关资料</h2><div class="s-product-document">';
              Object.keys(groups).forEach(function (tn) {
                var items = groups[tn];
                html += '<div class="s-product-document__type"><h3 class="s-product-document__title">' + _escape(tn) + '</h3><ul class="s-product-document__list">';
                items.forEach(function (doc) {
                  var lc = doc.isPublic === false ? ' c-link--locked' : '';
                  html += '<li class="c-link c-link--document' + lc + '"><a class="c-link__link" href="' + _escape(doc.fileUrl || '#') + '" target="_blank"><div class="c-link__params"><span class="c-link__name">' + _escape(doc.title || doc.fileName || '') + '</span></div></a></li>';
                });
                html += '</ul></div>';
              });
              html += '</div>';
              data.docHtml = html;
              console.log('[DIAG] ✅ 文档渲染完成');
            })
            .catch(function (e) {
              console.warn('[DIAG] 加载文档失败:', e.message || e);
            });
        }

        // ====== 申请样品（与个人护理 addCart 一致）======
        function requestSample() {
          console.log('[DIAG] requestSample 被点击');
          if (!checkLoginStatus()) {
            showDialog('请先<a href="/account.html">登录</a>后申请样品，或点"申请样品/资料"直接申请！');
            return;
          }
          var product = data._productData || {};
          console.log('[DIAG] 添加到购物车, product:', product.id, product.name);
          GatteAPI.Cart.add({
            productType: 'pharma_product',
            productId: parseInt(product.id),
            productName: product.name || ''
          }).then(function () {
            data.inCart = true;
            var applyBt = document.getElementById('applySampleBt');
            var seeBt = document.getElementById('seeCartBt');
            if (applyBt) applyBt.style.display = 'none';
            if (seeBt) seeBt.style.display = 'block';
            showDialog('已添加到购物车！');
          }).catch(function (err) {
            console.error('添加购物车失败:', err);
            showDialog('操作失败，请重试');
          });
        }

        // ====== 收藏切换 ======
        function toggleFavorite() {
          console.log('[DIAG] toggleFavorite 被点击');
          if (!checkLoginStatus()) {
            showDialog('请先<a href="/account.html">登录</a>');
            return;
          }
          if (data.inFav) return;
          var product = data._productData || {};
          GatteAPI.Favorite.add({
            itemType: 'pharma_product',
            itemId: parseInt(product.id)
          }).then(function () {
            data.inFav = true;
            showDialog('已添加到收藏');
          }).catch(function (err) {
            console.error('收藏失败:', err);
            showDialog('收藏失败，请重试');
          });
        }

        // ====== 初始化：加载产品（与个人护理 getProductDetail 一致）======
        if (!data._slug) {
          console.error('[DIAG] ❌ 无法提取 slug');
          data.showDescription = false;
        } else {
          loadProduct(data._slug);
        }

        return {
          data,
          loadProduct,
          loadBlocks,
          loadDocs,
          requestSample,
          toggleFavorite
        };
      }
    });
    app.mount('#app');
  </script>
  <!-- ★ 补齐原站 Drupal 主题 JS（按钮交互依赖这些文件） -->

  <script src="/sites/default/files/js/js_aMnLMGSG2CsdZriZXsPE0C6OPSZlxF9gZKkFabaxKnQ.js"></script>
  <!-- ★ 禁用 cookie 弹窗（tarteaucitron），仅加载不执行核心逻辑 -->
  <script>var tarteaucitron = { init: function(){}, user: { interface: { openAlert: function(){} } } };</script>
  <script src="/themes/custom/gattefosse/js/libraries/tarteaucitron/tarteaucitron.js?1724144171"></script>
  <script src="/sites/default/files/js/js_AGtGO5-z4j5_wdQKvTl9_lxubjwgGGoHPEhvmhh8dnk.js"></script>
  <script src="/sites/default/files/js/js_cVVQ78Ym14r4j6aYTQP6iZV8nVYAb2Ei1yjBmEJshZg.js"></script>
  <!-- ★ 与个人护理一致：header/footer/quickLinks 在 Drupal JS 之后加载 -->
  <script>
    $(document).ready(function () {
      $("#header").load("/header.html");
      $("#footer").load("/footer.html");
      $("#quickLinks").load("/quickLinks.html");

      // ★ pharma 特有：解绑 Drupal 原站 JS 对按钮的 handler
      // （个人护理无 js-request-sample 按钮，不需要此操作；
      //   pharma 的 js_aMnLMGSG... 中有 $(this).hide() 导致按钮消失）
      $('.js-request-sample').off('click');
    });
  </script></body>
